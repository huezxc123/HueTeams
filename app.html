<script>
  const firebaseConfig = {
    apiKey: "AIzaSyAohgBioG5ZDyhu3t5PO1OGbZEupGNzIc8",
    authDomain: "payrol-saas.firebaseapp.com",
    databaseURL: "https://payrol-saas-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "payrol-saas",
    storageBucket: "payrol-saas.firebasestorage.app",
    messagingSenderId: "314676130295",
    appId: "1:314676130295:web:bf6077ee69530f70ca3ef2"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();
  const auth = firebase.auth();

  let companySettings = {};
  let currentUser = null;
  let currentCompanyId = null;
  let companyUsers = {};
  let companyAttendance = {};
  let companyLeaves = {};
  let companyHolidays = {};
  let companyRoles = {};
  let companySchedules = {};
  let currentUserRole = null;
  let currentPage = 'dashboard';

  const ALL_PAGES = [
    { id: 'dashboard',  label: '🏠 Dashboard' },
    { id: 'employees',  label: '👥 Employees' },
    { id: 'attendance', label: '🕐 Attendance' },
    { id: 'leaves',     label: '📅 Leaves' },
    { id: 'schedule',   label: '🗓 Schedule' },
    { id: 'payroll',    label: '💳 Payroll' },
    { id: 'timestamps', label: '📋 Timestamp Sheet' },
    { id: 'holidays',   label: '📆 Holidays' },
    { id: 'audit',      label: '🔍 Audit Logs' },
    { id: 'settings',   label: '⚙️ Settings' },
  ];
  const MN = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const DOW = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const SC = ['','P','RD','RDS','SL','VL','A','NPL','NPSL','S','UT','HD','BL','PL','ML'];

  const ALL_POWERS = [
    { id: 'manageEmployees',       label: '👥 Manage Employees',        desc: 'Add, edit, CSV import employees' },
    { id: 'editAttendance',        label: '🕐 Edit Attendance',          desc: 'Cycle/change attendance cells' },
    { id: 'approveLeaves',         label: '📅 Approve / Reject Leaves',  desc: 'Approve or reject leave requests' },
    { id: 'manageHolidays',        label: '📆 Manage Holidays',          desc: 'Add and delete holidays' },
    { id: 'viewAuditLogs',         label: '🔍 View Audit Logs',          desc: 'Access the audit log page' },
    { id: 'managePayrollSettings', label: '💳 Manage Payroll Settings',  desc: 'Change payroll computation settings' },
    { id: 'manageCompanySettings', label: '⚙️ Manage Company Settings',  desc: 'Edit company name, plan, departments' },
    { id: 'manageRoles',           label: '🔐 Manage Roles',             desc: 'Create, edit, delete custom roles' },
  ];

  function yearOptions(selYear) {
    const cur = new Date().getFullYear();
    return [cur, cur-1, cur-2].map(y => `<option value="${y}"${y===selYear?' selected':''}>${y}</option>`).join('');
  }

  const toast = (msg, type='info') => {
    const c = document.getElementById('toastContainer');
    while (c.children.length >= 3) c.removeChild(c.firstChild);
    const t = document.createElement('div'); t.className = `toast toast-${type}`; t.textContent = msg; c.appendChild(t);
    setTimeout(() => t.remove(), 4000);
  };
  const esc = s => { const d = document.createElement('div'); d.textContent = s||''; return d.innerHTML; };
  // FIX #11: Safe JS string encoding for onclick attributes to prevent quote injection
  const jsStr = s => JSON.stringify(String(s||''));
  const sortEmps = () => Object.entries(companyUsers).filter(([,u]) => !u.disabled).sort(([,a],[,b]) => (a.empID||'').localeCompare(b.empID||''));
  const getCompanyPath = () => `companies/${currentCompanyId}`;

  let _appInitialized = false;
  auth.onAuthStateChanged(async user => {
    if (!user) {
      if (_appInitialized) window.location.href = 'index.html';
      else setTimeout(() => { if (!auth.currentUser) window.location.href = 'index.html'; }, 1500);
      return;
    }
    if (_appInitialized) return;
    _appInitialized = true;
    currentUser = user;
    document.getElementById('userDisplayName').textContent = user.email;
    const _safetyTimer = setTimeout(() => dismissLoadingOverlay(), 10000);
    try { await user.getIdToken(true); } catch(e) {}

    let userData = null;
    for (let attempt = 1; attempt <= 5; attempt++) {
      try {
        const snap = await db.ref(`users/${user.uid}`).once('value');
        userData = snap.val();
        if (userData && userData.companyId) break;
      } catch(e) {}
      if (attempt < 5) await new Promise(r => setTimeout(r, 800));
    }
    if (!userData || !userData.companyId) {
      try {
        const companiesSnap = await db.ref('companies').once('value');
        const companies = companiesSnap.val() || {};
        for (const [cid, company] of Object.entries(companies)) {
          if (company.users && company.users[user.uid]) {
            await db.ref(`users/${user.uid}`).set({ companyId: cid });
            userData = { companyId: cid }; break;
          }
        }
      } catch(e) {}
    }
    if (!userData || !userData.companyId) {
      clearTimeout(_safetyTimer); dismissLoadingOverlay();
      document.querySelector('.main-content').innerHTML = `
        <div style="max-width:480px;margin:80px auto;padding:32px;background:#fff;border-radius:12px;box-shadow:0 4px 16px rgba(0,0,0,.1);text-align:center;">
          <div style="font-size:2rem;margin-bottom:16px;">⚠️</div>
          <h2 style="margin-bottom:12px;">Account Not Linked</h2>
          <p style="color:#6b7280;margin-bottom:24px;">Your account (<b>${esc(user.email)}</b>) is not linked to any company.</p>
          <button class="btn btn-primary" onclick="auth.signOut().then(()=>window.location.href='index.html')">Back to Login</button>
        </div>`;
      return;
    }
    clearTimeout(_safetyTimer);
    currentCompanyId = userData.companyId;
    loadCompanySettings();
    setupRealtimeListeners();
    startAutoClockOut();
  });

  function loadCompanySettings() {
    db.ref(`${getCompanyPath()}/settings`).once('value', snap => {
      const s = snap.val() || {};
      if (s.companyName) document.querySelector('.sidebar-logo').innerHTML = '<div class="sidebar-logo-icon"><i class="fa-solid fa-crow"></i></div> ' + esc(s.companyName);
    });
  }

  let _attListenerKey = null;
  let _attListenerOff = null;
  function _subscribeAttendance(mon, year) {
    const key = `${year}_${mon}`;
    if (_attListenerKey === key) return;
    if (_attListenerOff) { _attListenerOff(); _attListenerOff = null; }
    _attListenerKey = key;
    const ref = db.ref(`${getCompanyPath()}/attendance`);
    const cb = snap => { companyAttendance = snap.val() || {}; _scheduleRender(); };
    ref.on('value', cb);
    _attListenerOff = () => ref.off('value', cb);
  }

  let _renderTimer = null;
  function _scheduleRender() {
    if (_renderTimer) return;
    _renderTimer = requestAnimationFrame(() => { _renderTimer = null; renderCurrentPage(); });
  }

  let _firstUsersLoad = true;
  function setupRealtimeListeners() {
    const base = getCompanyPath();
    const now = new Date();
    db.ref(`${base}/users`).on('value', snap => {
      companyUsers = snap.val() || {};
      if (currentUser) {
        const me = companyUsers[currentUser.uid] || {};
        currentUserRole = me.role || 'Employee';
      }
      applyRolePermissions();
      dismissLoadingOverlay();
      if (_firstUsersLoad) { _firstUsersLoad = false; switchPage('dashboard'); }
      else _scheduleRender();
    });
    _subscribeAttendance(now.getMonth(), now.getFullYear());
    db.ref(`${base}/leave_requests`).on('value', snap => { companyLeaves = snap.val() || {}; _scheduleRender(); });
    db.ref(`${base}/holidays`).on('value', snap => { companyHolidays = snap.val() || {}; _scheduleRender(); });
    db.ref(`${base}/settings`).on('value', snap => { companySettings = snap.val() || {}; _scheduleRender(); });
    db.ref(`${base}/roles`).on('value', snap => { companyRoles = snap.val() || {}; applyRolePermissions(); _scheduleRender(); });
    db.ref(`${base}/schedules`).on('value', snap => { companySchedules = snap.val() || {}; _scheduleRender(); });
  }

  const PLAN_LIMITS = { starter: 20, pro: 50, enterprise: Infinity };
  function getPlanLimit() { return PLAN_LIMITS[(companySettings.plan||'starter').toLowerCase()] ?? 20; }
  function getActiveEmpCount() { return Object.values(companyUsers).filter(u => !u.disabled).length; }

  function isAdmin() {
    if (!currentUser) return false;
    return (companyUsers[currentUser.uid]||{}).role === 'Admin';
  }
  function canDo(powerId) {
    if (isAdmin()) return true;
    const roleData = companyRoles[currentUserRole];
    if (!roleData || !roleData.powers) return false;
    return !!roleData.powers[powerId];
  }
  function canAccessPage(pageId) {
    if (isAdmin()) return true;
    const roleData = companyRoles[currentUserRole];
    if (!roleData || !roleData.pages) return pageId === 'dashboard';
    return !!roleData.pages[pageId];
  }
  function applyRolePermissions() {
    document.querySelectorAll('.sidebar-item[data-page]').forEach(el => {
      el.style.display = canAccessPage(el.dataset.page) ? '' : 'none';
    });
    if (!canAccessPage(currentPage)) switchPage('dashboard');
  }

  document.querySelectorAll('.sidebar-item').forEach(el => el.addEventListener('click', () => switchPage(el.dataset.page)));

  function switchPage(page) {
    if (!canAccessPage(page)) { toast('Access denied.', 'error'); return; }
    if (_renderTimer) { cancelAnimationFrame(_renderTimer); _renderTimer = null; }
    if (currentPage === 'dashboard' && page !== 'dashboard') {
      if (window._clockInterval) { clearInterval(window._clockInterval); window._clockInterval = null; }
    }
    currentPage = page;
    document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
    const navEl = document.querySelector(`.sidebar-item[data-page="${page}"]`);
    if (navEl) navEl.classList.add('active');
    document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
    document.getElementById(`page-${page}`).classList.add('active');
    document.getElementById('pageTitle').textContent = page.charAt(0).toUpperCase() + page.slice(1);
    showPageSpinner(page);
    renderCurrentPage();
  }

  function renderCurrentPage() {
    const renderers = {
      dashboard: renderDashboard, employees: renderEmployees, attendance: renderAttendance,
      schedule: renderSchedule, leaves: renderLeaves, payroll: renderPayroll,
      timestamps: renderTimestamps, holidays: renderHolidays, audit: renderAudit, settings: renderSettings
    };
    if (renderers[currentPage]) renderers[currentPage]();
  }

  let _overlayDismissed = false;
  function dismissLoadingOverlay() {
    if (_overlayDismissed) return;
    _overlayDismissed = true;
    const ov = document.getElementById('appLoadingOverlay');
    if (ov) { ov.classList.add('fade-out'); setTimeout(() => ov.remove(), 450); }
  }

  function showPageSpinner(pageId) {
    const el = document.getElementById('page-' + pageId);
    if (el && !el.innerHTML.trim()) {
      el.innerHTML = `<div class="spinner-wrap"><div class="spinner"></div><span style="font-size:.875rem;color:var(--text-muted);">Loading…</span></div>`;
    }
  }

  // ==================== DASHBOARD ====================
  function renderDashboard() {
    const now = new Date();
    const uid = currentUser.uid;
    const userData = companyUsers[uid] || {};
    const shift = userData['shift_'+now.getMonth()] || userData.defaultShift || '—';
    const totalEmp = Object.values(companyUsers).filter(u => !u.disabled).length;
    let presentToday = 0;
    const todayKey = `${now.getMonth()}_${now.getDate()}`;
    Object.values(companyAttendance).forEach(att => { if (att && att[todayKey] === 'P') presentToday++; });
    const pendingLeaves = Object.values(companyLeaves).filter(l => l.status === 'Pending').length;
    const myAtt = companyAttendance[uid] || {};
    const isClockedIn = myAtt[todayKey] === 'P' && myAtt[todayKey+'_time'] && !myAtt[todayKey+'_out'];
    document.getElementById('page-dashboard').innerHTML = `
      <div class="stats-row">
        <div class="stat-card"><div class="stat-label">Employees</div><div class="stat-num">${totalEmp}</div></div>
        <div class="stat-card"><div class="stat-label">Present Today</div><div class="stat-num">${presentToday}</div></div>
        <div class="stat-card"><div class="stat-label">Pending Leaves</div><div class="stat-num">${pendingLeaves}</div></div>
        <div class="stat-card"><div class="stat-label">My Shift</div><div class="stat-num" style="font-size:1.2rem;">${esc(shift)}</div></div>
      </div>
      <div class="card">
        <div class="card-header"><div class="card-title">Quick Clock</div></div>
        <div class="clock-widget">
          <div class="clock-time" id="liveClock">00:00:00</div>
          <div class="clock-date" id="liveDate"></div>
          <button id="btnClockIn" class="clock-btn in${isClockedIn?' hidden':''}" onclick="clockAction('IN')">▶ Clock In</button>
          <button id="btnClockOut" class="clock-btn out${!isClockedIn?' hidden':''}" onclick="clockAction('OUT')">■ Clock Out</button>
        </div>
      </div>`;
    updateClock();
    if (window._clockInterval) clearInterval(window._clockInterval);
    window._clockInterval = setInterval(updateClock, 1000);
  }

  function updateClock() {
    const now = new Date();
    const cl = document.getElementById('liveClock'); if (cl) cl.textContent = now.toLocaleTimeString();
    const dl = document.getElementById('liveDate'); if (dl) dl.textContent = now.toLocaleDateString('en-PH', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
  }
  function updateClockButtons(isClockedIn) {
    document.getElementById('btnClockIn')?.classList.toggle('hidden', isClockedIn);
    document.getElementById('btnClockOut')?.classList.toggle('hidden', !isClockedIn);
  }

  async function clockAction(type) {
    const now = new Date();
    const mon = now.getMonth(); const day = now.getDate();
    const key = `${mon}_${day}`;
    const uid = currentUser.uid;
    // FIX #3: Always read fresh attendance snapshot from DB to avoid stale state race condition
    const freshSnap = await db.ref(`${getCompanyPath()}/attendance/${uid}`).once('value');
    const att = freshSnap.val() || {};
    const userData = companyUsers[uid] || {};

    if (type === 'IN') {
      if (att[key] === 'P' && att[key+'_time'] && !att[key+'_out']) { toast('Already clocked in.', 'error'); return; }
      let lateMin = 0;
      const timeSlot = (userData['shift_'+mon] || userData.defaultShift || '').trim();
      if (timeSlot) {
        const startRaw = timeSlot.split(/[-–]/)[0].trim();
        const match = startRaw.match(/(\d{1,2}):?(\d{2})?\s*(AM|PM)?/i);
        if (match) {
          let sh = parseInt(match[1]), sm = parseInt(match[2]||'0'), ampm = (match[3]||'').toUpperCase();
          if (ampm === 'PM' && sh < 12) sh += 12;
          if (ampm === 'AM' && sh === 12) sh = 0;
          const shiftStart = new Date(now);
          shiftStart.setHours(sh, sm, 0, 0);
          // Handle overnight shifts: if shift starts in the evening (>=18) and current time is early morning, shift started yesterday
          if (sh >= 18 && now.getHours() < 12) shiftStart.setDate(shiftStart.getDate()-1);
          // If shift starts early morning (<6) and current time is late evening, shift starts tomorrow
          if (sh < 6 && now.getHours() >= 18) shiftStart.setDate(shiftStart.getDate()+1);
          const diff = now - shiftStart;
          if (diff > 0) lateMin = Math.floor(diff / 60000);
        }
      }
      const upd = { [key]: 'P', [key+'_time']: now.toISOString(), [key+'_late']: lateMin };
      try {
        const res = await fetch('https://ipapi.co/json/');
        if (res.ok) { const ipData = await res.json(); if (ipData.ip) upd[key+'_ip'] = ipData.ip; if (ipData.org||ipData.isp) upd[key+'_isp'] = ipData.org||ipData.isp; }
      } catch(e) {}
      await db.ref(`${getCompanyPath()}/attendance/${uid}`).update(upd);
      await db.ref(`${getCompanyPath()}/audit_logs`).push({ name: currentUser.email, action: `CLOCK IN${lateMin?' ('+lateMin+'m late)':''}`, timestamp: now.toISOString(), empID: uid });
      toast(lateMin ? `Clocked in – ${lateMin} min late` : 'Clocked in!', 'success');
      updateClockButtons(true);
    } else {
      // FIX #3 + #8: Fresh read, and check both today AND yesterday for overnight shifts
      let activeKey = null;

      // Check today first
      if (att[key+'_time'] && !att[key+'_out']) {
        activeKey = key;
      } else {
        // Check yesterday (handles overnight shift clock-out)
        const yesterday = new Date(now);
        yesterday.setDate(yesterday.getDate() - 1);
        const yKey = `${yesterday.getMonth()}_${yesterday.getDate()}`;
        // Re-fetch yesterday's data if needed (different month boundary)
        const ySnap = await db.ref(`${getCompanyPath()}/attendance/${uid}/${yKey+'_time'}`).once('value');
        const yOutSnap = await db.ref(`${getCompanyPath()}/attendance/${uid}/${yKey+'_out'}`).once('value');
        if (ySnap.val() && !yOutSnap.val()) {
          activeKey = yKey;
        }
      }

      if (!activeKey) { toast('No active clock-in found.', 'error'); return; }
      // Check again with fresh data if already clocked out
      const outCheck = await db.ref(`${getCompanyPath()}/attendance/${uid}/${activeKey+'_out'}`).once('value');
      if (outCheck.val()) { toast('Already clocked out.', 'error'); return; }

      await db.ref(`${getCompanyPath()}/attendance/${uid}`).update({ [activeKey+'_out']: now.toISOString() });
      await db.ref(`${getCompanyPath()}/audit_logs`).push({ name: currentUser.email, action: 'CLOCK OUT', timestamp: now.toISOString(), empID: uid });
      toast('Clocked out!', 'success');
      updateClockButtons(false);
    }
  }

  // FIX #8: Auto clock-out now also checks yesterday's key for overnight shifts
  function startAutoClockOut() {
    if (window._autoClockInterval) clearInterval(window._autoClockInterval);
    window._autoClockInterval = setInterval(async () => {
      if (!currentUser || !currentCompanyId) return;
      const uid = currentUser.uid;
      const now = new Date();

      // Check today
      const todayKey = `${now.getMonth()}_${now.getDate()}`;
      // Check yesterday (overnight shifts)
      const yesterday = new Date(now);
      yesterday.setDate(yesterday.getDate() - 1);
      const yesterdayKey = `${yesterday.getMonth()}_${yesterday.getDate()}`;

      const keysToCheck = [todayKey, yesterdayKey];

      for (const checkKey of keysToCheck) {
        const snap = await db.ref(`${getCompanyPath()}/attendance/${uid}`).once('value');
        const att = snap.val() || {};
        if (att[checkKey] === 'P' && att[checkKey+'_time'] && !att[checkKey+'_out']) {
          const inTime = new Date(att[checkKey+'_time']);
          if (now - inTime >= 12 * 60 * 60 * 1000) {

  function parseCSVLine(line) {
    // Properly handles quoted fields that may contain commas or escaped quotes
    const cols = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') {
        if (inQ && line[i+1] === '"') { cur += '"'; i++; } // escaped quote
        else inQ = !inQ;
      } else if (ch === ',' && !inQ) {
        cols.push(cur.trim()); cur = '';
      } else {
        cur += ch;
      }
    }
    cols.push(cur.trim());
    return cols;
  }
  function parseCSV(text) {
    const lines = text.trim().split(/\r?\n/);
    if (lines.length < 2) return { headers: [], rows: [] };
    const headers = parseCSVLine(lines[0]);
    const rows = lines.slice(1).map(line => {
      const cols = parseCSVLine(line);
      const obj = {}; headers.forEach((h, i) => { obj[h] = cols[i] || ''; }); return obj;
    });
    return { headers, rows };
  }
  function previewCSV(input) {
    const file = input.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      const { headers, rows } = parseCSV(e.target.result);
      _csvRows = rows;
      document.getElementById('csvPreviewLabel').textContent = `Found ${rows.length} employee(s):`;
      let html = `<thead><tr>${headers.map(h=>`<th>${esc(h)}</th>`).join('')}</tr></thead><tbody>`;
      rows.slice(0,20).forEach(r => { html += `<tr>${headers.map(h=>`<td>${esc(r[h]||'')}</td>`).join('')}</tr>`; });
      html += '</tbody>';
      document.getElementById('csvPreviewTable').innerHTML = html;
      document.getElementById('csvPreviewArea').style.display = '';
    };
    reader.readAsText(file);
  }
  async function doCSVImport() {
    if (!canDo('manageEmployees')) { toast('Access denied', 'error'); return; }
    if (!_csvRows.length) { toast('No rows to import', 'error'); return; }
    const btn = document.querySelector('#csvImportModal .btn-primary');
    if (btn) { btn.disabled=true; btn.textContent='Importing…'; }
    let imported=0, skipped=0, errors=[];
    const empLimit = getPlanLimit();
    // FIX #4: Get fresh count once BEFORE the loop, increment manually to avoid stale realtime snapshot
    let currentCount = getActiveEmpCount();
    for (const row of _csvRows) {
      const name = row.fullName||row.name||'';
      if (!name) { skipped++; continue; }
      // FIX #4: Use locally tracked count instead of re-calling getActiveEmpCount() each iteration
      if (currentCount + imported >= empLimit) { errors.push(`Employee limit of ${empLimit} reached. Remaining rows skipped.`); break; }
      const empID = row.empID||row.id||('EMP'+String(Date.now()).slice(-5));
      try {
        await db.ref(`${getCompanyPath()}/users`).push({ fullName:name, email:row.email||'', dept:row.dept||'', role:row.role||'Employee', monthlySalary:parseFloat(row.monthlySalary||0)||0, empID });
        imported++;
      } catch(err) { errors.push(name+': '+err.message); }
    }
    if (btn) { btn.disabled=false; btn.textContent='Import All'; }
    const al = document.getElementById('csvImportAlert');
    if (errors.length && al) { al.textContent = errors.join('; '); al.classList.remove('hidden'); }
    toast(`Imported ${imported}${skipped?' ('+skipped+' skipped)':''}`, imported?'success':'error');
    await db.ref(`${getCompanyPath()}/audit_logs`).push({ name:currentUser.email, action:`CSV IMPORT: ${imported}`, timestamp:new Date().toISOString() });
    if (imported > 0) cancelCSVImport();
  }

  async function saveEmp(e) {
    e.preventDefault();
    if (!canDo('manageEmployees')) { toast('Access denied.', 'error'); return; }
    const saveBtn = document.getElementById('saveEmpBtn');
    const name = document.getElementById('efName').value.trim();
    const email = document.getElementById('efEmail').value.trim();
    const dept = document.getElementById('efDept').value;
    const role = document.getElementById('efRole').value;
    const salary = Math.max(0, parseFloat(document.getElementById('efSalary').value)||0);
    const customEmpID = document.getElementById('efEmpID').value.trim();
    const alertEl = document.getElementById('empFormAlert');
    if(alertEl){ alertEl.classList.add('hidden'); alertEl.textContent=''; }
    if (!name||!email) return showEmpError('Name and email required.');
    if (editingEmpId) {
      // FIX #2: Check for duplicate email when editing (exclude the current employee)
      const emailLower = email.toLowerCase();
      const emailConflict = Object.entries(companyUsers).find(([uid, u]) => uid !== editingEmpId && (u.email||'').toLowerCase() === emailLower && !u.disabled);
      if (emailConflict) return showEmpError(`Email "${esc(email)}" is already used by another employee.`);
      // FIX #4: Check for duplicate empID when editing (exclude the current employee)
      if (customEmpID) {
        const idConflict = Object.entries(companyUsers).find(([uid, u]) => uid !== editingEmpId && (u.empID||'') === customEmpID && !u.disabled);
        if (idConflict) return showEmpError(`Employee ID "${esc(customEmpID)}" is already in use.`);
      }
      saveBtn.disabled=true; saveBtn.textContent='Saving...';
      try {
        await db.ref(`${getCompanyPath()}/users/${editingEmpId}`).update({ fullName:name,email,dept,role,monthlySalary:salary,...(customEmpID?{empID:customEmpID}:{}) });
        await db.ref(`${getCompanyPath()}/audit_logs`).push({ name:currentUser.email, action:`EDIT EMPLOYEE: ${name}`, timestamp:new Date().toISOString() });
        toast('Employee updated!','success'); cancelEmp(); editingEmpId=null;
      } catch(err) { showEmpError('Error: '+err.message); }
      finally { saveBtn.disabled=false; saveBtn.innerHTML='<i class="fa-solid fa-floppy-disk"></i> Save Employee'; }
    } else {
      const pass = document.getElementById('efPass').value;
      if (pass.length < 6) return showEmpError('Password must be at least 6 characters.');
      const emailLower = email.toLowerCase();
      if (Object.values(companyUsers).find(u => (u.email||'').toLowerCase()===emailLower)) return showEmpError(`Email "${esc(email)}" already exists.`);
      if (getActiveEmpCount() >= getPlanLimit()) return showEmpError(`Employee limit (${getPlanLimit()}) reached.`);
      // FIX #4: Validate duplicate empID on new employee
      const allEmps = Object.values(companyUsers);
      const maxNum = allEmps.reduce((max,u) => { const n=parseInt((u.empID||'').replace(/\D/g,''))||0; return n>max?n:max; },0);
      const newEmpID = customEmpID||('EMP'+String(maxNum+1).padStart(3,'0'));
      if (customEmpID && allEmps.find(u => (u.empID||'') === customEmpID && !u.disabled)) return showEmpError(`Employee ID "${esc(customEmpID)}" is already in use.`);
      saveBtn.disabled=true; saveBtn.innerHTML='<i class="fa-solid fa-spinner fa-spin"></i> Creating...';
      try {
        let secondaryApp;
        // FIX #12: Separate try/catch for app initialization vs user creation for clearer error handling
        try { secondaryApp = firebase.app('secondary'); }
        catch(_) {
          try { secondaryApp = firebase.initializeApp(firebaseConfig, 'secondary'); }
          catch(initErr) { throw new Error('Failed to initialize auth service: ' + initErr.message); }
        }
        const secondaryAuth = secondaryApp.auth();
        const userCred = await secondaryAuth.createUserWithEmailAndPassword(email, pass);
        const newUid = userCred.user.uid;
        await secondaryAuth.signOut();
        await db.ref(`users/${newUid}`).set({ companyId:currentCompanyId });
        await db.ref(`${getCompanyPath()}/users/${newUid}`).set({ fullName:name, email, dept, role, monthlySalary:salary, empID:newEmpID });
        await db.ref(`${getCompanyPath()}/audit_logs`).push({ name:currentUser.email, action:`ADD EMPLOYEE: ${name} (${newEmpID})`, timestamp:new Date().toISOString() });
        toast(`Employee "${name}" added! ID: ${newEmpID}`,'success'); cancelEmp(); editingEmpId=null;
      } catch(err) {
        if (err.code==='auth/email-already-in-use') showEmpError('Email already registered.');
        else showEmpError('Error: '+err.message);
      } finally { saveBtn.disabled=false; saveBtn.innerHTML='<i class="fa-solid fa-floppy-disk"></i> Save Employee'; }
    }
  }

  async function saveEmpCustomCols(uid) {
    const cols = companySettings.customColumns||[];
    // FIX #6: Start with existing overrides and selectively update/delete
    // Blank input = remove the override (revert to company default)
    const existingOverrides = (companyUsers[uid]||{}).customColOverrides || {};
    const overrides = { ...existingOverrides };
    cols.forEach(col => {
      const inputId = 'eccol_'+col.name.replace(/\s/g,'_');

      if (val !== '' && val !== undefined && val !== null) {
        overrides[col.name] = parseFloat(val);

  // ==================== ATTENDANCE ====================
  function renderAttendance() {
    const now = new Date();
    const savedMon = document.getElementById('attMonth')?.value;
    const savedYear = document.getElementById('attYear')?.value;
    const savedPeriod = document.getElementById('attPeriod')?.value;
    const savedShift = document.getElementById('attShiftFilter')?.value || '';
    const mon = savedMon !== undefined && savedMon !== '' ? parseInt(savedMon) : now.getMonth();
    const year = savedYear !== undefined && savedYear !== '' ? parseInt(savedYear) : now.getFullYear();
    _subscribeAttendance(mon, year);
    const dim = new Date(year, mon+1, 0).getDate();
    const perVal = savedPeriod || (now.getDate()<=15?'1-15':'16-31');
    let pS=1, pE=dim;
    if (perVal==='1-15') pE=15; else if (perVal==='16-31') pS=16;
    const shiftFilter = savedShift.trim().toLowerCase();
    const DOW_SHORT = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    const holMap = {};
    Object.values(companyHolidays).forEach(h => {
      if (!h||!h.date) return;
      const hd = new Date(h.date+'T00:00:00');
      if (hd.getFullYear()===year && hd.getMonth()===mon) holMap[hd.getDate()]=h;
    });

    // Build header row with day number + day-of-week sub-label
    let html = `<table style="min-width:${680+(pE-pS+1)*46}px;border-collapse:collapse;">
      <thead><tr>
        <th style="min-width:90px;position:sticky;left:0;z-index:2;background:var(--bg);">EMP ID</th>
        <th style="min-width:160px;">Name</th>
        <th style="min-width:70px;">Dept</th>
        <th style="min-width:90px;">Shift</th>`;
    for (let d=pS; d<=pE; d++) {
      const hol = holMap[d];
      const dow = new Date(year,mon,d).getDay();
      const isWeekend = dow===0||dow===6;
      const isToday = (year===now.getFullYear()&&mon===now.getMonth()&&d===now.getDate());
      const holBg = hol ? (hol.type==='regular'?'background:#fffbeb;':'background:#faf5ff;') : (isWeekend?'background:#f8f9fb;':'');
      const todayStyle = isToday ? 'outline:2px solid var(--primary);outline-offset:-2px;' : '';
      html += `<th style="text-align:center;min-width:46px;padding:6px 2px;${holBg}${todayStyle}">
        <div style="font-size:11px;font-weight:700;line-height:1.2;">${d}</div>
        <div style="font-size:9px;font-weight:500;color:${isWeekend?'#f59e0b':'var(--text-muted)'};">${DOW_SHORT[dow]}</div>
        ${hol?`<div class="holiday-badge${hol.type==='special'?' special':''}" style="max-width:42px;">${esc(hol.name.slice(0,5))}</div>`:''}
      </th>`;
    }
    html += `<th style="text-align:center;min-width:60px;color:#991b1b;">LATES<br><span style="font-size:9px;font-weight:500;">(MIN)</span></th></tr></thead><tbody>`;

    sortEmps().forEach(([uid,u]) => {
      const shift = u['shift_'+mon]||u.defaultShift||'';
      if (shiftFilter && !shift.toLowerCase().includes(shiftFilter)) return;
      const att = companyAttendance[uid]||{};
      let totalLate=0;

      // Detect night shift for moon icon
      const isNight = shift.toLowerCase().includes('night');

      html += `<tr>
        <td style="font-size:12px;font-weight:700;padding:8px 14px;position:sticky;left:0;background:var(--card);z-index:1;">${esc(u.empID||uid)}</td>
        <td style="padding:8px 14px;font-weight:600;">${esc(u.fullName)}</td>
        <td style="padding:8px 14px;font-size:12px;color:var(--text-muted);">${esc(u.dept||'')}</td>
        <td style="padding:8px 14px;font-size:11px;color:var(--text-muted);">${esc(shift)}${isNight?' 🌙':''}</td>`;

      for (let d=pS; d<=pE; d++) {
        const k=`${mon}_${d}`, st=att[k]||'', late=parseInt(att[k+'_late']||0);
        totalLate+=late;
        const dow = new Date(year,mon,d).getDay();
        const isWeekend = dow===0||dow===6;

  // FIX #6: Guard against unknown status codes in cycleAtt
  async function cycleAtt(uid, key) {
    if (!canDo('editAttendance')) { toast('No permission to edit attendance.','error'); return; }
    const cur = (companyAttendance[uid]||{})[key]||'';
    const idx = SC.indexOf(cur);
    // If status not found in SC (e.g. legacy/unknown code), start from index 1 (first real status 'P')
    const nxt = SC[(idx < 0 ? 0 : idx + 1) % SC.length];
    await db.ref(`${getCompanyPath()}/attendance/${uid}/${key}`).set(nxt);
    await db.ref(`${getCompanyPath()}/audit_logs`).push({ name:currentUser.email, action:`Changed ${uid} ${key} → ${nxt}`, timestamp:new Date().toISOString() });
  }

  async function autoPostAllRestDays(mon, year) {
    year = year || new Date().getFullYear();
    const dim = new Date(year,mon+1,0).getDate();
    for (const [uid,u] of Object.entries(companyUsers)) {
      if (u.disabled) continue;
      const off1=u['off1_'+mon]||'', off2=u['off2_'+mon]||'';
      if (!off1&&!off2) continue;
      const att=companyAttendance[uid]||{};
      const updates={};
      for (let d=1; d<=dim; d++) {
        const k=`${mon}_${d}`; if (att[k]) continue;
        const date=new Date(year,mon,d);
        if (off1===DOW[date.getDay()]||off2===DOW[date.getDay()]) updates[k]='RD';
      }
      if (Object.keys(updates).length) await db.ref(`${getCompanyPath()}/attendance/${uid}`).update(updates);
    }
    toast('Rest days filled!','success');
  }

  function exportAttExcel() {
    const mon=parseInt(document.getElementById('attMonth')?.value??new Date().getMonth());
    const year=parseInt(document.getElementById('attYear')?.value??new Date().getFullYear());
    const per=document.getElementById('attPeriod')?.value||'1-15';
    const dim=new Date(year,mon+1,0).getDate();
    let pS=1, pE=dim;
    if(per==='1-15'){pS=1;pE=Math.min(15,dim);}
    else if(per==='16-31'){pS=16;pE=dim;}
    const data=[['Emp ID','Name','Dept','Shift']];
    for(let d=pS;d<=pE;d++) data[0].push('Day '+d);
    data[0].push('Total Lates (min)');
    sortEmps().forEach(([uid,u])=>{
      const att=companyAttendance[uid]||{};
      const row=[u.empID||uid,u.fullName,u.dept,u['shift_'+mon]||u.defaultShift||''];
      let tl=0;
      for(let d=pS;d<=pE;d++){ const k=`${mon}_${d}`,st=att[k]||'',late=parseInt(att[k+'_late']||0); tl+=late; row.push(late?`${st}(${late}m late)`:st); }
      row.push(tl); data.push(row);
    });
    const ws=XLSX.utils.aoa_to_sheet(data),wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,'Attendance');
    XLSX.writeFile(wb,`Attendance_${MN[mon]}_${pS}-${pE}_${year}.xlsx`);
  }

  // ==================== LEAVES ====================
  function renderLeaves() {
    const leaves=Object.entries(companyLeaves).sort((a,b)=>new Date(b[1].submittedAt||0)-new Date(a[1].submittedAt||0));
    const canManage=isAdmin()||canDo('approveLeaves')||canDo('manageEmployees');
    const canApprove=canDo('approveLeaves');
    // FIX #13: Employee sees leaves where they are the subject (empID) OR submitter — managers see all
    const visibleLeaves = canManage
      ? leaves
      : leaves.filter(([,lv]) => lv.empID === currentUser.uid);
    const ANNUAL_SL=parseFloat(companySettings.annual_sl??5);
    const ANNUAL_VL=parseFloat(companySettings.annual_vl??5);
    const thisYear=new Date().getFullYear();
    function getLeaveUsed(empUid,type) {
      return Object.values(companyLeaves).filter(lv=>lv.empID===empUid&&lv.type===type&&lv.status==='Approved').reduce((sum,lv)=>{
        // FIX #3: Count only days that actually fall within thisYear, not just leaves that start in thisYear
        const s=new Date(lv.startDate),e=new Date(lv.endDate);
        const yearStart=new Date(thisYear,0,1), yearEnd=new Date(thisYear,11,31);
        const effectiveStart=s<yearStart?yearStart:s;
        const effectiveEnd=e>yearEnd?yearEnd:e;
        if(effectiveStart>effectiveEnd) return sum;
        const days=Math.round((effectiveEnd-effectiveStart)/86400000)+1;
        return sum+(isNaN(days)?0:days);
      },0);
    }
    const balList=canManage?sortEmps().map(([uid,u])=>[uid,u]):[[currentUser.uid,companyUsers[currentUser.uid]||{}]];
    const balanceRows=balList.map(([uid,u])=>{
      const slU=getLeaveUsed(uid,'SL'),vlU=getLeaveUsed(uid,'VL');
      const slL=Math.max(0,ANNUAL_SL-slU),vlL=Math.max(0,ANNUAL_VL-vlU);
      const bar=(used,total)=>{const pct=total>0?Math.min(100,(used/total)*100):0;const col=pct>=100?'#ef4444':pct>=80?'#f59e0b':'#10b981';return `<div style="height:6px;background:#e5e7eb;border-radius:3px;width:80px;display:inline-block;vertical-align:middle;"><div style="height:6px;background:${col};border-radius:3px;width:${pct}%;"></div></div>`;};
      return `<tr><td>${esc(u.empID||uid)}</td><td>${esc(u.fullName||uid)}</td><td>${bar(slU,ANNUAL_SL)} ${slU}/${ANNUAL_SL} <span style="font-weight:700;color:${slL===0?'var(--red)':'var(--green)'};">(${slL} left)</span></td><td>${bar(vlU,ANNUAL_VL)} ${vlU}/${ANNUAL_VL} <span style="font-weight:700;color:${vlL===0?'var(--red)':'var(--green)'};">(${vlL} left)</span></td></tr>`;
    }).join('');
    let rows='';
    if (!visibleLeaves.length) rows='<tr><td colspan="6" style="text-align:center;color:var(--text-muted);padding:32px;">No leave requests.</td></tr>';
    else visibleLeaves.forEach(([lid,lv])=>{
      const emp=companyUsers[lv.empID]||{};
      let actions;
      if(lv.status==='Pending'&&canApprove) actions=`<button class="btn btn-success btn-sm" onclick="approveLeave(${jsStr(lid)})">✓</button><button class="btn btn-danger btn-sm" onclick="rejectLeave(${jsStr(lid)})">✕</button>`;
      else { const col=lv.status==='Approved'?'var(--green)':lv.status==='Pending'?'var(--amber)':'var(--red)'; actions=`<span style="font-weight:700;color:${col};">${esc(lv.status)}</span>`; }
      rows+=`<tr><td>${esc(emp.fullName||lv.empID)}</td><td><span style="background:#e0e7ff;color:#3730a3;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;">${esc(lv.type)}</span></td><td>${esc(lv.startDate)}</td><td>${esc(lv.endDate)}</td><td>${esc(lv.reason||'—')}</td><td style="display:flex;gap:6px;">${actions}</td></tr>`;
    });
    const empOptions=canManage?sortEmps().map(([uid,u])=>`<option value="${esc(uid)}">${esc(u.fullName)}</option>`).join(''):
      `<option value="${esc(currentUser.uid)}">${esc(companyUsers[currentUser.uid]?.fullName||'Me')}</option>`;
    document.getElementById('page-leaves').innerHTML=`
      <div class="card" style="margin-bottom:16px;">
        <div class="card-header"><div class="card-title">📊 Leave Balances — ${thisYear}</div></div>
        <div class="table-wrap"><table><thead><tr><th>ID</th><th>Name</th><th>Sick Leave</th><th>Vacation Leave</th></tr></thead><tbody>${balanceRows}</tbody></table></div>
      </div>
      <div class="card"><div class="card-header"><div class="card-title">Leave Requests</div><button class="btn btn-primary" onclick="showLeaveForm()">+ New</button></div>
      <div class="table-wrap"><table><thead><tr><th>Employee</th><th>Type</th><th>Start</th><th>End</th><th>Reason</th><th>Actions</th></tr></thead><tbody>${rows}</tbody></table></div></div>
      <div class="card hidden" id="leaveForm"><div class="card-header"><div class="card-title">File a Leave</div></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div class="form-group"><label class="form-label">Employee</label><select class="form-select" id="lfEmp"${!canManage?' disabled':''}>${empOptions}</select></div>
        <div class="form-group"><label class="form-label">Leave Type</label><select class="form-select" id="lfType"><option>SL</option><option>VL</option><option>PL</option><option>ML</option><option>BL</option><option>NPL</option></select></div>
        <div class="form-group"><label class="form-label">Start Date</label><input type="date" class="form-input" id="lfStart"></div>
        <div class="form-group"><label class="form-label">End Date</label><input type="date" class="form-input" id="lfEnd"></div>

  }

      otRate:         parseFloat(s.pr_otRate        ?? 1.25),
      regHolRate:     parseFloat(s.pr_regHolRate    ?? 2.00),
      specHolRate:    parseFloat(s.pr_specHolRate   ?? 1.30),
      lateMode:       s.pr_lateMode                 ?? 'minute',
      sssMode:        s.pr_sssMode                  ?? 'auto',
      sssFixed:       parseFloat(s.pr_sssFixed      ?? 0),
      phMode:         s.pr_phMode                   ?? 'auto',
      phFixed:        parseFloat(s.pr_phFixed       ?? 0),
      phPct:          parseFloat(s.pr_phPct         ?? 0.025),
      pagibigMode:    s.pr_pagibigMode              ?? 'auto',
      pagibigFixed:   parseFloat(s.pr_pagibigFixed  ?? 0),
      pagibigPct:     parseFloat(s.pr_pagibigPct    ?? 0.02),
      pagibigCap:     parseFloat(s.pr_pagibigCap    ?? 200),
      sssCap:         parseFloat(s.pr_sssCap        ?? 1350),
      sssEmployeePct: parseFloat(s.pr_sssEmployeePct ?? 0.045),
      gracePeriod:    parseInt(s.pr_gracePeriod      ?? 0),
      payHolPresent:  s.pr_payHolPresent !== false,

      feat_vl_pay:        s.pr_feat_vl_pay        !== false,
      feat_hol_reg:       s.pr_feat_hol_reg       !== false,
      feat_hol_premium:   s.pr_feat_hol_premium   !== false,
      feat_nd_pay:        s.pr_feat_nd_pay        !== false,
      feat_absent_ded:    s.pr_feat_absent_ded    !== false,
      feat_late_ded:      s.pr_feat_late_ded      !== false,
      feat_npl_ded:       s.pr_feat_npl_ded       !== false,
      feat_ut_ded:        s.pr_feat_ut_ded        !== false,
      feat_sss:           s.pr_feat_sss           !== false,
      feat_philhealth:    s.pr_feat_philhealth     !== false,

  function calcNDHours(timeInISO, timeOutISO, ndStart, ndEnd) {
    if (!timeInISO || !timeOutISO) return 0;
    const tin=new Date(timeInISO), tout=new Date(timeOutISO);
    if (tout<=tin) return 0;
    const wraps=ndStart>ndEnd;
    const inNDWindow=h=>wraps?(h>=ndStart||h<ndEnd):(h>=ndStart&&h<ndEnd);
    let ndHours=0, cur=new Date(tin);
    while (cur<tout) {
      const next=new Date(Math.min(cur.getTime()+3600000,tout.getTime()));
      if (inNDWindow(cur.getHours())) ndHours+=(next-cur)/3600000;
      cur=next;
    }
    return ndHours;
  }

  // FIX #1: Use ?? instead of || for dateFrom/dateTo to handle falsy-but-valid value 0
  function calcAttendanceSummary(uid, mon, year, dateFrom, dateTo) {
    const att=companyAttendance[uid]||{};
    const pr=getPRSettings();
    const dim=new Date(year,mon+1,0).getDate();
    const dStart = dateFrom ?? 1;
    const dEnd   = dateTo   ?? dim;
    const holMap={};
    Object.values(companyHolidays).forEach(h=>{
      if(!h||!h.date) return;
      const hd=new Date(h.date+'T00:00:00');
      if(hd.getFullYear()===year&&hd.getMonth()===mon) holMap[hd.getDate()]=h;
    });
    let present=0,rd=0,rds=0,sl=0,vl=0,absent=0,npl=0,npsl=0,ut=0,hd=0,lateMin=0;
    let unworkedRegHolDays=0, workedRegHolDays=0, workedSpecHolDays=0, ndHours=0;
    for (let d=dStart; d<=dEnd; d++) {
      const k=`${mon}_${d}`, st=att[k]||'';
      let rawLate=parseInt(att[k+'_late']||0);
      if (pr.gracePeriod>0&&rawLate>0) rawLate=Math.max(0,rawLate-pr.gracePeriod);
      lateMin+=rawLate;
      const hol=holMap[d];
      if (st==='P') {
        present++;
        if (hol&&pr.payHolPresent) {
          if (hol.type==='regular') workedRegHolDays++;
          else if (hol.type==='special') workedSpecHolDays++;
        }
        ndHours+=calcNDHours(att[k+'_time'],att[k+'_out'],pr.ndStart,pr.ndEnd);
      } else if (st==='A') {
        if (hol&&hol.type==='regular') unworkedRegHolDays++;
        else absent++;
      } else if (!st) {
        if (hol&&hol.type==='regular') unworkedRegHolDays++;
      } else if (st==='RD') rd++;
      else if (st==='RDS') rds++;
      else if (st==='SL') sl++;
      else if (st==='VL') vl++;
      else if (st==='NPL') npl++;
      else if (st==='NPSL') npsl++;
      else if (st==='UT') ut++;
      else if (st==='HD') hd++;
    }
    return { present,rd,rds,sl,vl,absent,npl,npsl,ut,hd,lateMin,unworkedRegHolDays,workedRegHolDays,workedSpecHolDays,ndHours };
  }

  function calcGovDeductions(monthlySalary, pr) {
    let sss=0, philhealth=0, pagibig=0;
    if (pr.feat_sss) sss = pr.sssMode==='fixed' ? pr.sssFixed : Math.min(pr.sssCap, monthlySalary*pr.sssEmployeePct);
    if (pr.feat_philhealth) philhealth = pr.phMode==='fixed' ? pr.phFixed : monthlySalary*pr.phPct;
    if (pr.feat_pagibig) pagibig = pr.pagibigMode==='fixed' ? pr.pagibigFixed : Math.min(pr.pagibigCap, monthlySalary*pr.pagibigPct);
    return { sss, philhealth, pagibig };
  }

  function calcPayroll(uid, mon, year, dateFrom, dateTo) {
    const u=companyUsers[uid]||{};
    const monthlySalary=parseFloat(u.monthlySalary||0);
    const pr=getPRSettings();
    const dailyRate=monthlySalary/pr.workingDays;
    const hourlyRate=dailyRate/pr.hoursPerDay;
    const att=calcAttendanceSummary(uid,mon,year,dateFrom,dateTo);
    const gov=calcGovDeductions(monthlySalary,pr);
    const lateHours = pr.lateMode==='hour' ? Math.floor(att.lateMin/60) : att.lateMin/60;

    const earningsBreakdown=[];
    let grossPay=0;
    const addEarn=(label,amt)=>{ if(amt>0){earningsBreakdown.push({label,amount:amt});grossPay+=amt;} };

    addEarn('Basic Pay', att.present * dailyRate);
    if (pr.feat_sl_pay) addEarn('Sick Leave Pay', att.sl * dailyRate);
    if (pr.feat_vl_pay) addEarn('Vacation Leave Pay', att.vl * dailyRate);
    if (pr.feat_hol_reg) addEarn('Regular Holiday Pay', att.unworkedRegHolDays * dailyRate);
    if (pr.feat_hol_premium && pr.payHolPresent) {
      addEarn('Reg. Holiday Premium', att.workedRegHolDays * dailyRate * (pr.regHolRate - 1));
      addEarn('Special Holiday Premium', att.workedSpecHolDays * dailyRate * (pr.specHolRate - 1));
    }
    if (pr.feat_nd_pay) addEarn('Night Differential', att.ndHours * hourlyRate * pr.ndRate);

    // Custom Columns (earnings)
    const customCols = companySettings.customColumns || [];
    const empOverrides = companyUsers[uid]?.customColOverrides || {};
    customCols.filter(c=>c.type==='earning').forEach(col => {
      const amt = empOverrides[col.name] !== undefined ? parseFloat(empOverrides[col.name]) : parseFloat(col.amount);
      let value = 0;
      if (col.calc==='fixed') value = amt;
      else if (col.calc==='per_day_present') value = amt * att.present;
      else if (col.calc==='per_day_worked') value = amt * (att.present+att.sl+att.vl);
      else if (col.calc==='pct_basic') value = (att.present * dailyRate) * (amt/100);
      addEarn(col.name, value);
    });

    const deductionsBreakdown=[];
    let totalDeductions=0;
    const addDeduct=(label,amt)=>{ if(amt>0){deductionsBreakdown.push({label,amount:amt});totalDeductions+=amt;} };

    if (pr.feat_absent_ded) addDeduct('Absence Deduction', att.absent * dailyRate);
    if (pr.feat_late_ded) addDeduct('Late Deduction', lateHours * hourlyRate);
    if (pr.feat_npl_ded) addDeduct('NPL/NPSL Deduction', (att.npl + att.npsl) * dailyRate);
    if (pr.feat_ut_ded) addDeduct('Undertime Deduction', att.ut * dailyRate * 0.5);

    // Custom Columns (deductions)
    customCols.filter(c=>c.type==='deduction').forEach(col => {
      const amt = empOverrides[col.name] !== undefined ? parseFloat(empOverrides[col.name]) : parseFloat(col.amount);
      let value = 0;
      if (col.calc==='fixed') value = amt;
      else if (col.calc==='per_day_present') value = amt * att.present;
      else if (col.calc==='per_day_worked') value = amt * (att.present+att.sl+att.vl);
      else if (col.calc==='pct_basic') value = (att.present * dailyRate) * (amt/100);
      addDeduct(col.name, value);
    });

    if (pr.feat_sss) addDeduct('SSS', gov.sss);
    if (pr.feat_philhealth) addDeduct('PhilHealth', gov.philhealth);
    if (pr.feat_pagibig) addDeduct('Pag-IBIG', gov.pagibig);

    const netPay=grossPay-totalDeductions;
    return { monthlySalary,dailyRate,hourlyRate,grossPay,totalDeductions,netPay,
      earningsBreakdown,deductionsBreakdown,
      present:att.present,sl:att.sl,vl:att.vl,absent:att.absent,lateMin:att.lateMin,
      unworkedRegHolDays:att.unworkedRegHolDays,
      sss:gov.sss,philhealth:gov.philhealth,pagibig:gov.pagibig };
  }

      html+=`<tr><td colspan="${4+(pE-pS+1)}" style="text-align:center;color:var(--text-muted);padding:32px;">No records.</td></tr>`;

      empsToShow.forEach(([uid,u])=>{
        const att=companyAttendance[uid]||{};
        html+=`<tr>
          <td style="font-size:12px;font-weight:700;padding:6px 14px;position:sticky;left:0;background:var(--card);z-index:1;">${esc(u.empID||uid)}</td>
          <td style="padding:6px 14px;font-weight:600;font-size:13px;">${esc(u.fullName)}</td>
          <td style="padding:6px 14px;font-size:12px;color:var(--text-muted);">${esc(u.dept||'')}</td>`;
        for(let d=pS;d<=pE;d++){
          const k=`${selMon}_${d}`,st=att[k]||'';
          const timeIn=fmtTime(att[k+'_time']);
          const timeOut=fmtTime(att[k+'_out']);
          const late=att[k+'_late']?parseInt(att[k+'_late']):0;
          const dow=new Date(selYear,selMon,d).getDay();
          const isWeekend=dow===0||dow===6;
          const isToday=(selYear===now.getFullYear()&&selMon===now.getMonth()&&d===now.getDate());
          const hol=holMap[d];
          const holBorder=hol?`border-left:2px solid ${hol.type==='regular'?'#f59e0b':'#a78bfa'};`:'';
          const todayOutline=isToday?'outline:2px solid var(--primary);outline-offset:-2px;':'';

            html+=`<td class="s-${st}" style="padding:4px 3px;text-align:center;vertical-align:top;min-width:72px;border-radius:4px;${holBorder}${todayOutline}">
              <div style="font-size:10px;font-weight:700;line-height:1.4;">${esc(st)}${late?`<span class="late-tag">${late}m</span>`:''}</div>
              ${timeIn?`<div style="font-size:9px;font-weight:600;color:var(--text-muted);line-height:1.3;">▶ ${timeIn}</div>`:''}

        </div>
        <div class="table-wrap" style="overflow-x:auto;">${html}</div>

  function exportDTRExcel(mon,year,period,empFilter) {
    // Resolve period bounds (mirrors renderTimestamps logic)
    const dim=new Date(year,mon+1,0).getDate();
    let pS=1, pE=dim;
    if(period==='1-15'){pS=1;pE=Math.min(15,dim);}
    else if(period==='16-31'){pS=16;pE=dim;}

    // Resolve employee list (mirrors renderTimestamps filter)
    const empsToExport=sortEmps().filter(([uid])=>!empFilter||uid===empFilter);

    const data=[['Emp ID','Name','Date','Status','Time In','Time Out','Lates (min)','IP']];
    const fmtTime=iso=>{try{return iso?new Date(iso).toLocaleTimeString('en-PH',{hour:'2-digit',minute:'2-digit'}):''}catch(e){return'';}};
    empsToExport.forEach(([uid,u])=>{
      const att=companyAttendance[uid]||{};
      for(let d=pS;d<=pE;d++){
        const k=`${mon}_${d}`,st=att[k]||'';
        const dateStr=new Date(year,mon,d).toLocaleDateString('en-PH',{month:'short',day:'numeric',weekday:'short'});
        data.push([u.empID||uid,u.fullName,dateStr,st,fmtTime(att[k+'_time']),fmtTime(att[k+'_out']),parseInt(att[k+'_late']||0),att[k+'_ip']||'']);
      }
    });
    const ws=XLSX.utils.aoa_to_sheet(data),wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,'DTR');
    // Reflect period and employee in filename
    const empSuffix=empFilter?(companyUsers[empFilter]?.empID||'emp'):'all';
    const periodLabel=period==='full'?'Full':(period==='1-15'?'1-15':`16-${pE}`);
    XLSX.writeFile(wb,`DTR_${MN[mon]}_${periodLabel}_${empSuffix}_${year}.xlsx`);
  }

  async function saveHoliday() {

    const date=document.getElementById('hfDate').value,name=document.getElementById('hfName').value.trim(),type=document.getElementById('hfType').value;
    if(!date||!name) return toast('Date and name required','error');
    await db.ref(`${getCompanyPath()}/holidays`).push({date,name,type});
    document.getElementById('hfDate').value='';document.getElementById('hfName').value='';
    toast('Holiday added!','success');

    if(!canDo('manageHolidays')){toast('Access denied.','error');return;}
    if(!confirm('Delete?')) return;
    await db.ref(`${getCompanyPath()}/holidays/${hid}`).remove();
    toast('Deleted.','success');

  // ==================== SCHEDULE ====================
  function renderSchedule() {
    const now=new Date();
    const savedMon=document.getElementById('schMonth')?.value;
    const mon=savedMon!==undefined&&savedMon!==''?parseInt(savedMon):now.getMonth();
    const year=now.getFullYear();
    const emps=sortEmps();
    const allShifts=new Set();
    emps.forEach(([,u])=>{ if(u.defaultShift)allShifts.add(u.defaultShift); for(let m=0;m<12;m++){if(u['shift_'+m])allShifts.add(u['shift_'+m]);} });
    let rows='';
    emps.forEach(([uid,u])=>{
      const sch=companySchedules[uid]||{};
      const schMon=sch['m'+mon]||sch['default']||{};
      const shift=u['shift_'+mon]||u.defaultShift||'';

      // Compute effective hours
      const [inH,inM]=timeIn.split(':').map(Number);
      const [outH,outM]=timeOut.split(':').map(Number);

  let _schTimeDebounce={};
  function updateScheduleTime(uid,mon,field,value) {
    const key=uid+mon+field; clearTimeout(_schTimeDebounce[key]);
    _schTimeDebounce[key]=setTimeout(async()=>{
      const monKey='m'+mon;
      await db.ref(`${getCompanyPath()}/schedules/${uid}/${monKey}`).update({[field]:value});
      // Default is only updated via 'Copy to All Months' button, not on every change
    },600);
  }
  let _schDebounce={};
  function updateScheduleField(uid,mon,field,value) {
    const key=uid+mon+field; clearTimeout(_schDebounce[key]);
    _schDebounce[key]=setTimeout(async()=>{ const dbField=field==='shift'?`shift_${mon}`:field==='off1'?`off1_${mon}`:`off2_${mon}`; await db.ref(`${getCompanyPath()}/users/${uid}`).update({[dbField]:value}); },600);
  }
  async function copyShiftToAll(uid,sourceMon) {
    const u=companyUsers[uid]||{};
    const sch=companySchedules[uid]||{};
    const schMon=sch['m'+sourceMon]||sch['default']||{};
    const shift=u['shift_'+sourceMon]||u.defaultShift||'',off1=u['off1_'+sourceMon]||u.defaultOff1||'',off2=u['off2_'+sourceMon]||u.defaultOff2||'';
    const timeIn=schMon.timeIn||'08:00',timeOut=schMon.timeOut||'17:00',breakMin=schMon.breakMin??60;
    const updates={defaultShift:shift,defaultOff1:off1,defaultOff2:off2};
    for(let m=0;m<12;m++){updates['shift_'+m]=shift;updates['off1_'+m]=off1;updates['off2_'+m]=off2;}
    await db.ref(`${getCompanyPath()}/users/${uid}`).update(updates);
    // Also copy schedule times (timeIn/timeOut/breakMin) to all months
    const schUpd={timeIn,timeOut,breakMin};
    await db.ref(`${getCompanyPath()}/schedules/${uid}/default`).update(schUpd);
    for(let m=0;m<12;m++) await db.ref(`${getCompanyPath()}/schedules/${uid}/m${m}`).update(schUpd);
    const schUpdates={defaultTimeIn:timeIn,defaultTimeOut:timeOut,defaultBreakMin:breakMin,default:{timeIn,timeOut,breakMin}};
    for(let m=0;m<12;m++) schUpdates['m'+m]={timeIn,timeOut,breakMin};
    await db.ref(`${getCompanyPath()}/schedules/${uid}`).update(schUpdates);
    toast('Shift & hours copied to all months!','success');
  }
  function bulkApplyShift(mon){document.getElementById('bulkShiftPanel')?.classList.toggle('hidden');}
  async function doBulkShift(mon) {
    const shift=document.getElementById('bulkShiftVal')?.value?.trim();
    const scope=document.getElementById('bulkShiftScope')?.value;
    const timeIn=document.getElementById('bulkTimeIn')?.value||'08:00';
    const timeOut=document.getElementById('bulkTimeOut')?.value||'17:00';
    if(!shift) return toast('Enter a shift name','error');
    for(const[uid,u]of Object.entries(companyUsers)){
      if(u.disabled) continue;
      const userUpdates={};
      if(scope==='all'){userUpdates.defaultShift=shift;for(let m=0;m<12;m++)userUpdates['shift_'+m]=shift;}
      else userUpdates['shift_'+mon]=shift;
      await db.ref(`${getCompanyPath()}/users/${uid}`).update(userUpdates);
      // FIX #5: Preserve existing breakMin per employee; only override timeIn/timeOut
      const existingSch=companySchedules[uid]||{};
      const schUpdates={};
      if(scope==='all'){
        schUpdates.defaultTimeIn=timeIn;schUpdates.defaultTimeOut=timeOut;
        for(let m=0;m<12;m++){
          const existingBreak=existingSch['m'+m]?.breakMin??existingSch.default?.breakMin??existingSch.defaultBreakMin??60;
          schUpdates['m'+m]={timeIn,timeOut,breakMin:existingBreak};
        }
        const defBreak=existingSch.default?.breakMin??existingSch.defaultBreakMin??60;
        schUpdates.default={timeIn,timeOut,breakMin:defBreak};
      } else {
        const existingBreak=existingSch['m'+mon]?.breakMin??existingSch.default?.breakMin??existingSch.defaultBreakMin??60;
        schUpdates['m'+mon]={timeIn,timeOut,breakMin:existingBreak};
      }
      await db.ref(`${getCompanyPath()}/schedules/${uid}`).update(schUpdates);
    }
    document.getElementById('bulkShiftPanel')?.classList.add('hidden');
    toast(`Shift "${shift}" (${timeIn}–${timeOut}) applied to all!`,'success');
  }

  async function addCustomColumn() {
    if (!canDo('managePayrollSettings')) { toast('Access denied.','error'); return; }
    const name = document.getElementById('ccName')?.value?.trim();
    const type = document.getElementById('ccType')?.value;
    const calc = document.getElementById('ccCalc')?.value;
    const amount = parseFloat(document.getElementById('ccAmount')?.value);
    if (!name) return toast('Column name required','error');
    if (isNaN(amount) || amount < 0) return toast('Enter a valid amount','error');
    const existing = [...(companySettings.customColumns||[])];
    if (existing.find(c=>c.name.toLowerCase()===name.toLowerCase())) return toast('A column with that name already exists','error');
    existing.push({ name, type, calc, amount, enabled: true });
    await db.ref(`${getCompanyPath()}/settings`).update({ customColumns: existing });
    document.getElementById('ccName').value='';
    document.getElementById('ccAmount').value='';
    toast(`Column "${name}" added!`,'success');
  }

  async function deleteCustomCol(idx) {
    if (!canDo('managePayrollSettings')) { toast('Access denied.','error'); return; }
    const cols = [...(companySettings.customColumns||[])];
    const name = cols[idx]?.name;
    if (!confirm(`Delete column "${name}"? This will remove it from all payroll calculations.`)) return;
    cols.splice(idx,1);
    await db.ref(`${getCompanyPath()}/settings`).update({ customColumns: cols });
    toast(`Column "${name}" deleted.`,'success');
  }

  async function moveCustomCol(idx, dir) {
    const cols = [...(companySettings.customColumns||[])];
    const newIdx = idx+dir;
    if (newIdx<0||newIdx>=cols.length) return;
    [cols[idx],cols[newIdx]]=[cols[newIdx],cols[idx]];
    await db.ref(`${getCompanyPath()}/settings`).update({ customColumns: cols });
  }

      ndStart:        parseInt(g('pr_ndStart'))         ?? s.ndStart,
      ndEnd:          parseInt(g('pr_ndEnd'))           ?? s.ndEnd,
      gracePeriod:    parseInt(g('pr_gracePeriod'))     || 0,
      sssMode:        g('pr_sssMode')                  || s.sssMode,
      sssEmployeePct: parseFloat(g('pr_sssEmployeePct') || (s.sssEmployeePct*100)) / 100,
      sssCap:         parseFloat(g('pr_sssCap'))       || s.sssCap,
      sssFixed:       parseFloat(g('pr_sssFixed'))     || 0,
      phMode:         g('pr_phMode')                   || s.phMode,

      phFixed:        parseFloat(g('pr_phFixed'))      || 0,
      pagibigMode:    g('pr_pagibigMode')              || s.pagibigMode,
      pagibigPct:     parseFloat(g('pr_pagibigPct') || (s.pagibigPct*100)) / 100,
      pagibigCap:     parseFloat(g('pr_pagibigCap'))   || s.pagibigCap,
      pagibigFixed:   parseFloat(g('pr_pagibigFixed')) || 0,
      feat_sl_pay:     gb('feat_sl_pay'),

      feat_late_ded:   gb('feat_late_ded'),

      feat_pagibig:    gb('feat_pagibig'),

  function updateSettingsPreview() {
    const box = document.getElementById('settingsPreviewBox');
    if (!box) return;
    const salary   = parseFloat(document.getElementById('prevSalary')?.value)  || 20000;
    const present  = parseInt(document.getElementById('prevPresent')?.value)    || 22;
    const absent   = parseInt(document.getElementById('prevAbsent')?.value)     || 0;
    const sl       = parseInt(document.getElementById('prevSL')?.value)         || 0;
    const lateMin  = parseInt(document.getElementById('prevLate')?.value)       || 0;
    const ndH      = parseFloat(document.getElementById('prevND')?.value)       || 0;
    // FIX #9: Use live form values instead of saved companySettings
    const pr = getPreviewPRSettings();
    const dailyRate  = salary / pr.workingDays;
    const hourlyRate = dailyRate / pr.hoursPerDay;
    const effectiveLateMin  = pr.gracePeriod > 0 ? Math.max(0, lateMin - pr.gracePeriod) : lateMin;
    const effectiveLateHours = pr.lateMode === 'hour' ? Math.floor(effectiveLateMin / 60) : effectiveLateMin / 60;
    const fmt = n => '₱' + n.toLocaleString('en-PH', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

    const earns = [];
    let gross = 0;
    const ae = (label, amt) => { if (amt > 0) { earns.push({ label, amt }); gross += amt; } };
    ae('Basic Pay (' + present + ' days)', present * dailyRate);
    if (pr.feat_sl_pay && sl > 0) ae('Sick Leave Pay (' + sl + ' days)', sl * dailyRate);
    if (pr.feat_nd_pay && ndH > 0) ae('Night Differential (' + ndH + ' hrs)', ndH * hourlyRate * pr.ndRate);

    const dedcts = [];
    let totalDed = 0;
    const ad = (label, amt) => { if (amt > 0) { dedcts.push({ label, amt }); totalDed += amt; } };
    if (pr.feat_absent_ded && absent > 0) ad('Absence Deduction (' + absent + ' days)', absent * dailyRate);
    if (pr.feat_late_ded && effectiveLateHours > 0) ad('Late Deduction (' + effectiveLateMin + ' min)', effectiveLateHours * hourlyRate);
    if (pr.feat_sss) { const sss = pr.sssMode === 'fixed' ? pr.sssFixed : Math.min(pr.sssCap, salary * pr.sssEmployeePct); ad('SSS', sss); }
    if (pr.feat_philhealth) { const ph = pr.phMode === 'fixed' ? pr.phFixed : salary * pr.phPct; ad('PhilHealth', ph); }
    if (pr.feat_pagibig) { const pg = pr.pagibigMode === 'fixed' ? pr.pagibigFixed : Math.min(pr.pagibigCap, salary * pr.pagibigPct); ad('Pag-IBIG', pg); }

    const net = gross - totalDed;

    box.innerHTML = `
      <div class="preview-payslip">
        <div style="font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--text-muted);margin-bottom:10px;">Sample Payslip Calculation</div>
        <div style="font-size:.75rem;color:var(--text-muted);margin-bottom:8px;">Daily rate: ${fmt(dailyRate)} &nbsp;|&nbsp; Hourly rate: ${fmt(hourlyRate)}</div>
        <div class="preview-section-label">Earnings</div>
        ${earns.map(e=>`<div class="preview-row earn-row"><span>+ ${esc(e.label)}</span><span>${fmt(e.amt)}</span></div>`).join('')}
        <div class="preview-row" style="font-weight:600;padding-top:6px;border-top:1px solid var(--border);margin-top:4px;"><span>Gross Pay</span><span>${fmt(gross)}</span></div>
        <div class="preview-section-label" style="margin-top:10px;">Deductions</div>
        ${dedcts.map(d=>`<div class="preview-row deduct-row"><span>− ${esc(d.label)}</span><span>${fmt(d.amt)}</span></div>`).join('')}
        <div class="preview-row" style="font-weight:600;padding-top:6px;border-top:1px solid var(--border);margin-top:4px;color:var(--red);"><span>Total Deductions</span><span>${fmt(totalDed)}</span></div>
        <div class="preview-row total-row"><span>🟢 Net Pay</span><span>${fmt(net)}</span></div>
      </div>`;
  }

  async function savePayrollSettings() {
    if (!canDo('managePayrollSettings')) { toast('Access denied.', 'error'); return; }
    const g = id => document.getElementById(id)?.value;
    const gb = id => document.getElementById(id)?.checked ?? true;

    const sssEmpPct  = parseFloat(g('pr_sssEmployeePct') || '4.5') / 100;
    const phPct      = parseFloat(g('pr_phPct')          || '2.5') / 100;
    const pagibigPct = parseFloat(g('pr_pagibigPct')     || '2')   / 100;

    const updates = {
      pr_workingDays:      parseFloat(g('pr_workingDays'))  || 26,
      pr_hoursPerDay:      parseFloat(g('pr_hoursPerDay'))  || 8,
      pr_lateMode:         g('pr_lateMode')                 || 'minute',
      pr_regHolRate:       parseFloat(g('pr_regHolRate'))   || 2.0,
      pr_specHolRate:      parseFloat(g('pr_specHolRate'))  || 1.3,
      pr_ndStart:          parseInt(g('pr_ndStart'))        ?? 22,
      pr_ndEnd:            parseInt(g('pr_ndEnd'))          ?? 6,
      pr_ndRate:           parseFloat(g('pr_ndRate'))       || 0.10,
      pr_sssMode:          g('pr_sssMode')                  || 'auto',
      pr_sssEmployeePct:   sssEmpPct,
      pr_sssCap:           parseFloat(g('pr_sssCap'))       || 1350,
      pr_sssFixed:         parseFloat(g('pr_sssFixed'))     || 0,
      pr_phMode:           g('pr_phMode')                   || 'auto',
      pr_phPct:            phPct,
      pr_phFixed:          parseFloat(g('pr_phFixed'))      || 0,
      pr_pagibigMode:      g('pr_pagibigMode')              || 'auto',
      pr_pagibigPct:       pagibigPct,
      pr_pagibigCap:       parseFloat(g('pr_pagibigCap'))   || 200,
      pr_pagibigFixed:     parseFloat(g('pr_pagibigFixed')) || 0,
      pr_gracePeriod:      parseInt(g('pr_gracePeriod'))    || 0,
      pr_payHolPresent:    true,
      pr_feat_sl_pay:      gb('feat_sl_pay'),
      pr_feat_vl_pay:      gb('feat_vl_pay'),
      pr_feat_hol_reg:     gb('feat_hol_reg'),
      pr_feat_hol_premium: gb('feat_hol_premium'),
      pr_feat_nd_pay:      gb('feat_nd_pay'),
      pr_feat_absent_ded:  gb('feat_absent_ded'),
      pr_feat_late_ded:    gb('feat_late_ded'),
      pr_feat_npl_ded:     gb('feat_npl_ded'),
      pr_feat_ut_ded:      gb('feat_ut_ded'),
      pr_feat_sss:         gb('feat_sss'),
      pr_feat_philhealth:  gb('feat_philhealth'),
      pr_feat_pagibig:     gb('feat_pagibig'),
    };
    await db.ref(`${getCompanyPath()}/settings`).update(updates);
    await db.ref(`${getCompanyPath()}/audit_logs`).push({ name: currentUser.email, action: 'SAVE PAYROLL SETTINGS', timestamp: new Date().toISOString() });
    toast('Settings saved!', 'success');
  }

  async function updateCompanySettings() {
    if (!canDo('manageCompanySettings')) { toast('Access denied.', 'error'); return; }
    const name = document.getElementById('compNameInput')?.value?.trim();
    const depts = document.getElementById('compDeptInput')?.value?.trim();
    if (!name) return toast('Company name required', 'error');
    const plan = document.getElementById('compPlanInput')?.value || 'starter';
    const annual_sl = parseFloat(document.getElementById('compAnnualSL')?.value ?? 5);
    const annual_vl = parseFloat(document.getElementById('compAnnualVL')?.value ?? 5);
    const updates = { companyName: name, plan, annual_sl, annual_vl };
    if (depts) updates.departments = depts;
    await db.ref(`${getCompanyPath()}/settings`).update(updates);
    document.querySelector('.sidebar-logo').innerHTML = '<div class="sidebar-logo-icon"><i class="fa-solid fa-crow"></i></div> ' + esc(name);
    toast('Settings saved!', 'success');
  }

  // ===== ROLE MANAGEMENT =====
  let editingRoleName = null;
  function showRoleForm(prefillName) {
    editingRoleName = prefillName || null;
    document.getElementById('roleFormTitle').textContent = prefillName ? `Edit: ${prefillName}` : 'New Role';
    document.getElementById('rfRoleName').value = prefillName || '';
    document.getElementById('rfRoleName').disabled = !!prefillName;
    ALL_PAGES.filter(p=>p.id!=='settings').forEach(p => {
      const cb = document.getElementById('rfPage_'+p.id);
      if (cb) cb.checked = prefillName ? (companyRoles[prefillName]?.pages?.[p.id]||false) : (p.id==='dashboard');
    });
    ALL_POWERS.forEach(pw => {
      const cb = document.getElementById('rfPower_'+pw.id);
      if (cb) cb.checked = prefillName ? (companyRoles[prefillName]?.powers?.[pw.id]||false) : false;
    });
    document.getElementById('roleForm').classList.remove('hidden');
    document.getElementById('roleForm').scrollIntoView({ behavior: 'smooth' });
  }
  function editRole(roleName) { showRoleForm(roleName); }
  function cancelRoleForm() { document.getElementById('roleForm')?.classList.add('hidden'); editingRoleName = null; }
  async function saveRole() {
    if (!canDo('manageRoles')) { toast('Access denied.', 'error'); return; }
    const name = (document.getElementById('rfRoleName').value || '').trim();
    if (!name) return toast('Role name required', 'error');
    if (name.toLowerCase() === 'admin') return toast('"Admin" is reserved', 'error');
    // FIX #5: Prevent silently overwriting an existing role when creating new one
    if (!editingRoleName && companyRoles[name]) {
      return toast(`Role "${name}" already exists. Edit it instead.`, 'error');
    }
    const pages = {}, powers = {};
    ALL_PAGES.filter(p=>p.id!=='settings').forEach(p => { const cb = document.getElementById('rfPage_'+p.id); if(cb) pages[p.id]=cb.checked; });
    ALL_POWERS.forEach(pw => { const cb = document.getElementById('rfPower_'+pw.id); if(cb) powers[pw.id]=cb.checked; });
    await db.ref(`${getCompanyPath()}/roles/${name}`).set({ pages, powers });
    await db.ref(`${getCompanyPath()}/audit_logs`).push({ name: currentUser.email, action: `${editingRoleName?'EDIT':'CREATE'} ROLE: ${name}`, timestamp: new Date().toISOString() });
    toast(`Role "${name}" saved!`, 'success'); cancelRoleForm();
  }
  async function deleteRole(roleName) {
    if (!canDo('manageRoles')) { toast('Access denied.', 'error'); return; }
    if (!confirm(`Delete role "${roleName}"?`)) return;
    await db.ref(`${getCompanyPath()}/roles/${roleName}`).remove();
    toast(`Role "${roleName}" deleted.`, 'success');
  }

  // ===== MOBILE SIDEBAR =====
  function closeSidebar() { document.getElementById('sidebar')?.classList.remove('open'); document.getElementById('sidebarOverlay')?.classList.remove('open'); }
  document.getElementById('sidebarToggle')?.addEventListener('click', () => {
    const open = document.getElementById('sidebar')?.classList.toggle('open');
    document.getElementById('sidebarOverlay')?.classList.toggle('open', open);
  });
  document.querySelectorAll('.sidebar-item').forEach(el => el.addEventListener('click', () => { if (window.innerWidth <= 768) closeSidebar(); }));

  // ===== LOGOUT =====
  document.getElementById('logoutBtn').addEventListener('click', () => auth.signOut());
</script>
</body>
</html>
